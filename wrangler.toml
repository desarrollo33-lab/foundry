name = "foundry-mcp"
compatibility_date = "2026-02-24"
main = "foundry-mcp/src/index.ts"
compatibility_flags = ["nodejs_compat_v2"]

[[d1_databases]]
binding = "FOUNDRY_DB"
database_name = "foundry-db"
database_id = "c884943b-97df-403b-8fb8-184c94052a59"

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "foundry-docs"

[[vectorize]]
binding = "VECTORIZE"
index_name = "foundry-docs"

[ai]
binding = "AI"

[browser]
binding = "BROWSER"
